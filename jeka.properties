# Please, update to last JeKa version
jeka.version=0.11.66
jeka.java.version=25

# Allow command-line shortcuts as `jeka build` instead of `jeka project: build`
jeka.kbean.default=project

# Necessary to build runnable application jar
@project.pack.jarType=FAT
@project.pack.mainClass=app.Application

# Use a simpler project layout than the standard Maven one
@project.layout.style=SIMPLE
@project.layout.mixSourcesAndResources=true

# Include ErrorProne/NullAway compile-processor
@project.compilation.compilerOptions=\
  -XDcompilePolicy=simple \
  --should-stop=ifError=FLOW \
  "-Xplugin:ErrorProne -Xep:NullAway:ERROR -XepOpt:NullAway:AnnotatedPackages=app"

@native.metadataRepoVersion=